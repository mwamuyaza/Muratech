# ===================================================================
# Muratech CCTV Enterprise Security Systems
# Spring Boot Production properties configuration
# ===================================================================

# Server Connection settings
server.port=${PORT:8080}
server.servlet.context-path=/api

# Active Profiles
spring.profiles.active=prod

# Spring Web Configuration
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# Datasource configuration (Configured with production environment variable placeholders)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:muratech_cctv_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA & Hibernate ORM Settings
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Jackson JSON Configuration
spring.jackson.serialization.indent_output=true
spring.jackson.default-property-inclusion=non_null

# Spring Security default user configuration (Optional baseline if security starter is enabled)
spring.security.user.name=admin
spring.security.user.password=admin123

# File upload properties limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
