databases:
  - name: muratech_cctv_db
    databaseName: muratech_cctv_db
    user: muratech_admin
    plan: free

services:
  - type: web
    name: muratech-cctv-backend
    runtime: java
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/cctv-backend.jar
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
      - key: DB_HOST
        fromDatabase:
          name: muratech_cctv_db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: muratech_cctv_db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: muratech_cctv_db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: muratech_cctv_db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: muratech_cctv_db
          property: password
